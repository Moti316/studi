name: E2E Tests

on:
  pull_request:

jobs:
  playwright:
    name: Playwright (chromium + mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium webkit

      # e2e רץ במצב mock (ללא Supabase env) — UI נטען, actions מחזירות שגיאה
      # ידידותית, ו-middleware no-op בפיתוח. החיווט האמיתי מקבל e2e ייעודי
      # כשיהיו keys.
      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
