name: Auto-Format

# רץ על PRs שמטרגטים main, אבל רק על branches מסוג claude/**
# מריץ prettier --write ועושה commit-back אם יש שינויים
# [skip ci] ב-commit-message מונע infinite-loop עם CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  format:
    name: Prettier Auto-Format
    # רץ רק על branches claude/** — לא על main, לא על branches של bots
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm via corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run prettier --write
        run: pnpm prettier --write '**/*.{md,json,yaml,ts,tsx}'

      - name: Commit and push if changed
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style(auto-format): prettier --write [skip ci]"
            git push
          else
            echo "No formatting changes needed."
          fi
