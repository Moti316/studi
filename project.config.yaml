project_name: StudiBuilder
project_slug: studibuilder
project_description: פלטפורמת AI שמחוללת קורסי-לימוד גיימיפיקטיביים בעברית מתוך מסמכי-מקור
  (PDF/Word/PPT) - בהשראת StudiesGo, לשימוש פנימי.
core_problem: הפיכת חומר-לימוד קיים (חוברות, מצגות, ספרי-לימוד) לחוויית-לימוד אינטראקטיבית
  בסגנון Duolingo - אוטומטית ע"י AI, בעברית RTL, עם XP/streak וגיוון סוגי-שאלות.
